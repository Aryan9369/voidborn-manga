<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="voidGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="crackGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#voidGrad)"/>
  <!-- Crack/Fracture -->
  <ellipse cx="200" cy="220" rx="80" ry="100" fill="url(#crackGlow)" opacity="0.4"/>
  <polyline points="200,80 195,130 205,160 190,200 210,240 195,280 200,340" stroke="#7B61FF" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9"/>
  <polyline points="200,140 170,160 155,180" stroke="#7B61FF" stroke-width="1" fill="none" opacity="0.5"/>
  <polyline points="200,200 230,220 245,240" stroke="#7B61FF" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Figure silhouette -->
  <ellipse cx="200" cy="390" rx="22" ry="28" fill="#e8e8f0" opacity="0.9"/>
  <rect x="184" y="416" width="32" height="60" rx="4" fill="#e8e8f0" opacity="0.9"/>
  <rect x="165" y="418" width="20" height="45" rx="4" fill="#e8e8f0" opacity="0.9"/>
  <rect x="215" y="418" width="20" height="45" rx="4" fill="#e8e8f0" opacity="0.9"/>
  <rect x="180" y="476" width="16" height="42" rx="3" fill="#e8e8f0" opacity="0.9"/>
  <rect x="204" y="476" width="16" height="42" rx="3" fill="#e8e8f0" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="320" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="50" cy="180" r="1" fill="white" opacity="0.3"/>
  <circle cx="350" cy="150" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="30" cy="300" r="1" fill="white" opacity="0.4"/>
  <circle cx="370" cy="280" r="1" fill="white" opacity="0.3"/>
  <!-- Title -->
  <text x="200" y="510" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold" fill="white" letter-spacing="8">VOIDBORN</text>
  <text x="200" y="535" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7B61FF" letter-spacing="4">CHAPTER ONE</text>
</svg>
